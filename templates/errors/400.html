<!doctype html>
<html lang="en">
<head>

  <title>Bad Request</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; max-width: 760px; }
    .box { border: 1px solid #ddd; border-radius: 8px; padding: 16px; }

    <h1>Request could not be processed</h1>

  </div>
</body>
</html>
